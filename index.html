<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Grind</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#05050f;}
body{font-family:'Share Tech Mono',monospace;color:#00ffe5;}
#app{position:relative;width:100%;height:100vh;overflow:hidden;}
#bg-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;}
#anim-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}
#scan{position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,rgba(0,255,229,0.02) 0px,rgba(0,255,229,0.02) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:2;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;display:flex;flex-direction:column;}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(0,0,0,0.5);}
#menu-btn{background:rgba(10,10,30,0.8);border:1px solid #00ffe544;color:#00ffe5;font-family:'Share Tech Mono',monospace;font-size:20px;width:40px;height:40px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#menu-btn:active{background:#00ffe511;}
#credits-display{font-family:'Orbitron',monospace;font-size:16px;color:#ffd700;text-shadow:0 0 8px #ffd70066;}
#suit-name-top{font-family:'Orbitron',monospace;font-size:11px;color:#ff2d78;letter-spacing:3px;text-shadow:0 0 6px #ff2d7844;}
#suit-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:0 10px;}
#hp-container{width:70%;max-width:280px;margin-bottom:8px;}
#hp-label{font-size:9px;color:#00ffe566;letter-spacing:2px;margin-bottom:3px;text-align:center;}
#hp-bar-bg{background:rgba(10,10,30,0.7);border:1px solid #00ffe522;border-radius:3px;height:12px;width:100%;overflow:hidden;}
#hp-bar{height:100%;border-radius:2px;background:#00ff88;transition:width 0.12s;}
#hp-text{text-align:center;font-size:10px;color:#ff2d78;margin-top:3px;}
#suit-canvas{cursor:pointer;image-rendering:pixelated;image-rendering:crisp-edges;transition:transform 0.08s;}
#suit-canvas:active{transform:scale(0.94);}
.cpop{position:absolute;font-size:16px;font-weight:700;pointer-events:none;animation:floatup 1s ease-out forwards;font-family:'Orbitron',monospace;text-shadow:0 0 6px currentColor;}
@keyframes floatup{0%{opacity:1;transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.1)}100%{opacity:0;transform:translateY(-70px) scale(0.8)}}
#nav{display:flex;align-items:center;justify-content:center;gap:24px;padding:6px 0;}
.nav-btn{background:rgba(10,10,30,0.7);border:1px solid #00ffe544;color:#00ffe5;font-size:22px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;}
.nav-btn:active:not(:disabled){background:#00ffe522;transform:scale(0.92);}
.nav-btn:disabled{opacity:0.15;cursor:not-allowed;}
#suit-indicator{font-size:11px;color:#00ffe566;letter-spacing:2px;min-width:60px;text-align:center;}
#bottombar{padding:8px;background:rgba(0,0,0,0.5);text-align:center;font-size:8px;color:#00ffe522;letter-spacing:3px;}
#locked-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(5,5,15,0.92);border:2px solid #ff2d78;border-radius:8px;padding:24px 36px;text-align:center;display:none;z-index:5;}
#locked-overlay.show{display:block;}
#lock-cost{font-size:14px;color:#ffd700;margin:10px 0;}
#lock-btn{background:#ff2d7822;border:1px solid #ff2d78;color:#ff2d78;font-family:'Share Tech Mono',monospace;font-size:13px;padding:10px 28px;border-radius:4px;cursor:pointer;}
#lock-btn:active{background:#ff2d7844;}
#menu-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);z-index:20;display:none;align-items:center;justify-content:center;}
#menu-overlay.open{display:flex;}
#menu-box{background:#080818;border:1px solid #00ffe544;border-radius:10px;width:90%;max-width:360px;max-height:80vh;padding:20px;position:relative;overflow-y:auto;}
#menu-close{position:absolute;top:10px;right:10px;background:#ff2d7833;border:1px solid #ff2d78;color:#ff2d78;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
#menu-close:active{background:#ff2d7866;}
#menu-back{position:absolute;top:10px;left:10px;background:rgba(0,255,229,0.08);border:1px solid #00ffe544;color:#00ffe5;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;}
#menu-back.visible{display:flex;}
#menu-back:active{background:#00ffe522;}
#menu-title{text-align:center;font-family:'Orbitron',monospace;font-size:14px;color:#ff2d78;letter-spacing:3px;margin:6px 0 20px;text-shadow:0 0 8px #ff2d7844;}
.mi{display:flex;align-items:center;gap:14px;background:rgba(10,10,30,0.8);border:1px solid #00ffe522;border-radius:6px;padding:14px 18px;margin-bottom:8px;cursor:pointer;transition:all 0.12s;font-size:14px;}
.mi:active{border-color:#00ffe5;background:#00ffe511;}
.mi-icon{font-size:20px;width:28px;text-align:center;}
.vol-row{display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,30,0.8);border:1px solid #00ffe522;border-radius:6px;padding:14px 18px;margin-bottom:8px;}
.vol-btn{background:rgba(10,10,30,0.8);border:1px solid #00ffe544;color:#00ffe5;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.vol-btn:active{background:#00ffe522;}
.upg-item{display:flex;align-items:center;gap:10px;background:rgba(10,10,30,0.8);border:1px solid #00ffe522;border-radius:6px;padding:12px 14px;margin-bottom:8px;}
.upg-item.ulk{opacity:0.35;}
.upg-info{flex:1;}.upg-name{font-size:12px;color:#00ffe5;}.upg-desc{font-size:10px;color:#00ffe566;margin-top:2px;}.upg-ob{font-size:10px;color:#ff2d78;margin-top:2px;}
.upg-buy{background:rgba(10,10,30,0.8);border:1px solid #ffd700;color:#ffd700;font-family:'Share Tech Mono',monospace;font-size:11px;padding:6px 10px;border-radius:4px;cursor:pointer;white-space:nowrap;}
.upg-buy:disabled{opacity:0.25;cursor:not-allowed;}
.sr{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #00ffe511;font-size:12px;}.sr:last-child{border-bottom:none;}.sl{color:#00ffe566;}.sv{color:#ffd700;}
@keyframes shakeHit{0%{transform:translate(0,0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,1px)}100%{transform:translate(0,0)}}
.shake{animation:shakeHit 0.15s ease-out;}
</style>
</head>
<body>
<div id="app">
<canvas id="bg-canvas"></canvas>
<canvas id="anim-canvas"></canvas>
<div id="scan"></div>
<div id="ui">
<div id="topbar"><button id="menu-btn">&#9776;</button><div id="credits-display">&#8373; 0</div><div id="suit-name-top">UNIT-01</div></div>
<div id="suit-area">
<div id="hp-container"><div id="hp-label">HULL INTEGRITY</div><div id="hp-bar-bg"><div id="hp-bar"></div></div><div id="hp-text">10 / 10</div></div>
<canvas id="suit-canvas" width="160" height="200"></canvas>
<div id="locked-overlay"><div style="font-size:32px;margin-bottom:8px;">&#128274;</div><div style="font-size:13px;color:#00ffe5;">UNIT LOCKED</div><div id="lock-cost">&#8373;0</div><button id="lock-btn">UNLOCK</button></div>
</div>
<div id="nav"><button class="nav-btn" id="nav-left">&#9664;</button><div id="suit-indicator">1 / 7</div><button class="nav-btn" id="nav-right">&#9654;</button></div>
<div id="bottombar">NEON GRIND v2.0 // BREAK THE SUITS</div>
</div>
<div id="menu-overlay"><div id="menu-box"><button id="menu-close">&#10005;</button><button id="menu-back">&#9664;</button><div id="menu-title">// MENU //</div><div id="menu-content"></div></div></div>
</div>
<script>
(function(){
var W,H,bgCtx,animCtx;
var state={credits:0,currentSuit:0,volume:5,damage:1,
suits:[
{name:'UNIT-01',hp:10,maxHp:10,reward:3,cost:0,unlocked:true,color:'#667788'},
{name:'UNIT-02',hp:25,maxHp:25,reward:8,cost:30,unlocked:false,color:'#0088ff'},
{name:'UNIT-03',hp:60,maxHp:60,reward:20,cost:120,unlocked:false,color:'#ff6600'},
{name:'UNIT-04',hp:150,maxHp:150,reward:55,cost:400,unlocked:false,color:'#aa00ff'},
{name:'UNIT-05',hp:400,maxHp:400,reward:150,cost:1200,unlocked:false,color:'#ff2d78'},
{name:'UNIT-06',hp:1000,maxHp:1000,reward:400,cost:4000,unlocked:false,color:'#00ffe5'},
{name:'UNIT-07',hp:3000,maxHp:3000,reward:1200,cost:12000,unlocked:false,color:'#ffd700'}],
upgrades:[
{id:0,name:'Reinforced Fists',desc:'+1 dmg/click',cost:50,owned:0,val:1,mult:1.8,base:50},
{id:1,name:'Neural Accelerator',desc:'+3 dmg/click',cost:200,owned:0,val:3,mult:1.8,base:200},
{id:2,name:'Plasma Knuckles',desc:'+10 dmg/click',cost:800,owned:0,val:10,mult:1.8,base:800},
{id:3,name:'Quantum Strike',desc:'+30 dmg/click',cost:3000,owned:0,val:30,mult:1.8,base:3000},
{id:4,name:'GOD MODE FIST',desc:'+100 dmg/click',cost:10000,owned:0,val:100,mult:1.8,base:10000}],
stats:{clicks:0,credits:0,resets:0,suits_broken:0}};

function fmt(n){n=Math.floor(n);if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return''+n;}

var vehicles=[];
function initVehicles(){
vehicles=[];
for(var i=0;i<8;i++){
var goRight=Math.random()>0.5;
var lane=Math.floor(Math.random()*3);
vehicles.push({x:goRight?(-100-Math.random()*200):(W+100+Math.random()*200),y:0,lane:lane,speed:(goRight?1:-1)*(1.5+Math.random()*3),type:Math.random()>0.35?'tron':'car',color:['#00ffe5','#ff2d78','#ffd700','#aa00ff','#ff6600','#00ff88'][Math.floor(Math.random()*6)],trail:40+Math.random()*80});}
}

var drops=[];
function initRain(){drops=[];for(var i=0;i<90;i++){drops.push({x:Math.random()*W,y:Math.random()*H,s:4+Math.random()*7,l:8+Math.random()*16});}}

function drawBG(){
var c=document.getElementById('bg-canvas');W=c.width=window.innerWidth;H=c.height=window.innerHeight;bgCtx=c.getContext('2d');
var ctx=bgCtx;
for(var y=0;y<H*0.55;y++){var t=y/(H*0.55);ctx.fillStyle='rgb('+Math.floor(5+t*10)+','+Math.floor(5+t*6)+','+Math.floor(15+t*22)+')';ctx.fillRect(0,y,W,1);}
ctx.fillStyle='#0b0b18';ctx.fillRect(0,H*0.55,W,H*0.45);

ctx.fillStyle='#ffe8a0';ctx.beginPath();ctx.arc(W*0.82,H*0.07,Math.max(18,W*0.035),0,Math.PI*2);ctx.fill();
ctx.fillStyle='#070714';ctx.beginPath();ctx.arc(W*0.82+8,H*0.07-4,Math.max(14,W*0.028),0,Math.PI*2);ctx.fill();

ctx.fillStyle='#fff';for(var i=0;i<60;i++){ctx.fillRect(Math.random()*W,Math.random()*H*0.45,Math.random()>0.85?2:1,1);}

var bw=W/11;
for(var i=0;i<13;i++){var bx=i*bw-10+Math.random()*8;var bh=H*0.12+Math.random()*H*0.22;var by=H*0.56-bh;ctx.fillStyle='#080818';ctx.fillRect(bx,by,bw-3,bh+H*0.04);
if(Math.random()>0.55){ctx.fillStyle='#ff2d78';ctx.fillRect(bx+bw*0.4,by-10,2,10);ctx.fillRect(bx+bw*0.4-2,by-10,6,2);}
for(var r=by+6;r<by+bh-3;r+=7){for(var co=bx+2;co<bx+bw-6;co+=6){if(Math.random()>0.35){ctx.fillStyle=Math.random()>0.7?'#00ffe522':'#ffcc0033';ctx.fillRect(co,r,3,4);}}}}

for(var i=0;i<9;i++){var bx2=i*(W/7.5)-15+Math.random()*20;var bh2=H*0.1+Math.random()*H*0.16;var by2=H*0.6-bh2;ctx.fillStyle='#0c0c22';ctx.fillRect(bx2,by2,W/9,bh2+H*0.08);
for(var r=by2+5;r<by2+bh2;r+=8){for(var co=bx2+3;co<bx2+W/9-5;co+=7){if(Math.random()>0.3){ctx.fillStyle=Math.random()>0.5?'#ffcc0044':'#00aaff33';ctx.fillRect(co,r,4,5);}}}}

var tx=W*0.04,tw=W*0.13;
ctx.fillStyle='#0a0a28';ctx.fillRect(tx,H*0.1,tw,H*0.58);
ctx.fillStyle='#0c0c30';ctx.fillRect(tx+tw*0.1,H*0.06,tw*0.8,H*0.06);
ctx.fillStyle='#0e0e35';ctx.fillRect(tx+tw*0.2,H*0.02,tw*0.6,H*0.06);
ctx.fillStyle='#ff2d78';ctx.fillRect(tx+tw*0.45,0,3,H*0.03);ctx.fillRect(tx+tw*0.45-5,0,13,2);
for(var r=H*0.12;r<H*0.62;r+=8){for(var co=tx+3;co<tx+tw-3;co+=6){ctx.fillStyle=Math.random()>0.3?(Math.random()>0.5?'#ffcc0044':'#00ffe533'):'transparent';ctx.fillRect(co,r,4,5);}}
ctx.fillStyle='#ff2d78cc';ctx.fillRect(tx+2,H*0.28,tw-4,3);
ctx.fillStyle='#00ffe5cc';ctx.fillRect(tx+2,H*0.3,tw-4,2);

var t2x=W*0.82,t2w=W*0.11;
ctx.fillStyle='#0a0a25';ctx.fillRect(t2x,H*0.13,t2w,H*0.52);
ctx.fillStyle='#0c0c30';ctx.fillRect(t2x+t2w*0.15,H*0.08,t2w*0.7,H*0.07);
ctx.fillStyle='#00ffe5';ctx.fillRect(t2x+t2w*0.42,H*0.04,3,H*0.05);
for(var r=H*0.15;r<H*0.56;r+=8){for(var co=t2x+2;co<t2x+t2w-2;co+=6){ctx.fillStyle=Math.random()>0.3?'#ffcc0033':'transparent';ctx.fillRect(co,r,3,4);}}

var gY=H*0.72;
ctx.fillStyle='#0a0a16';ctx.fillRect(0,gY,W,H-gY);
ctx.fillStyle='#111118';ctx.fillRect(0,gY,W,H*0.13);
ctx.fillStyle='#ffcc0033';for(var i=0;i<W;i+=38){ctx.fillRect(i,gY+H*0.065-1,18,2);}
ctx.fillStyle='#1a1a2e';ctx.fillRect(0,gY-2,W,4);
ctx.fillStyle='#222233';ctx.fillRect(0,gY+H*0.13,W,3);

ctx.fillStyle='#ff2d7815';ctx.fillRect(W*0.05,gY+H*0.14,W*0.14,4);
ctx.fillStyle='#00ffe510';ctx.fillRect(W*0.4,gY+H*0.15,W*0.09,3);
ctx.fillStyle='#ffd70010';ctx.fillRect(W*0.7,gY+H*0.14,W*0.11,4);

var fs=Math.max(7,W*0.016);
ctx.font='bold '+fs+'px monospace';
ctx.fillStyle='#ff2d78aa';ctx.fillText('MEGACORP',W*0.02,H*0.2);
ctx.fillStyle='#00ffe5aa';ctx.fillText('NOODLES 24/7',W*0.5,H*0.26);
ctx.fillStyle='#ffaa00aa';ctx.fillText('HACK4HIRE',W*0.28,H*0.4);
ctx.fillStyle='#aa00ffaa';ctx.fillText('NEURAL.NET',W*0.6,H*0.16);
ctx.fillStyle='#00ff8888';ctx.fillText('SYNTH BAR',W*0.35,H*0.5);

// Girl
var gx=W*0.73,gy=gY-80,ps=3;
function gp(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(gx+x*ps,gy+y*ps,w*ps,h*ps);}
gp(2,24,4,3,'#111');gp(8,24,4,3,'#111');gp(2,26,5,1,'#ff2d78');gp(8,26,5,1,'#ff2d78');
gp(3,18,3,6,'#1a0044');gp(8,18,3,6,'#1a0044');
gp(2,9,10,10,'#0a0a2a');gp(2,9,2,10,'#ff2d78');gp(10,9,2,10,'#ff2d78');gp(2,9,10,1,'#00ffe5');
gp(0,10,2,7,'#cc8866');gp(12,10,2,7,'#cc8866');gp(0,10,2,4,'#0a0a2a');gp(12,10,2,4,'#0a0a2a');
gp(3,1,8,9,'#cc8866');gp(2,0,10,4,'#6600cc');gp(1,2,3,6,'#6600cc');gp(10,2,3,5,'#6600cc');gp(12,5,2,4,'#550099');
gp(4,4,3,2,'#00ffe5');gp(5,5,1,1,'#fff');gp(8,5,2,1,'#111');gp(8,4,2,1,'#ff2d78');
gp(5,7,3,1,'#ff6688');gp(1,5,1,2,'#00ffe5');gp(2,18,10,1,'#ffd700');

// Car
var cx=W*0.38,cy=gY-30,cp=2;
function c2(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(cx+x*cp,cy+y*cp,w*cp,h*cp);}
c2(0,8,60,12,'#1a1a3a');c2(5,0,40,10,'#22224a');c2(6,0,38,1,'#333355');
c2(7,1,16,8,'#001133');c2(26,1,17,8,'#001133');c2(24,1,2,8,'#333355');
c2(55,10,5,4,'#ffffaa');c2(55,9,4,2,'#ffffff44');c2(0,10,4,4,'#ff4400');
c2(2,20,56,2,'#ff2d7866');c2(0,19,60,1,'#ff2d7822');
c2(6,18,10,6,'#111');c2(44,18,10,6,'#111');c2(8,19,6,4,'#333');c2(46,19,6,4,'#333');
c2(2,12,56,1,'#00ffe522');c2(20,12,3,1,'#888');c2(38,12,3,1,'#888');

// Cat
var kx=cx+42*cp,ky=cy-6*cp,kp=2;
function kk(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(kx+x*kp,ky+y*kp,w*kp,h*kp);}
kk(0,4,8,5,'#888');kk(1,0,6,5,'#999');
kk(1,-2,2,3,'#888');kk(5,-2,2,3,'#888');kk(1,-1,1,2,'#ff9999');kk(6,-1,1,2,'#ff9999');
kk(2,1,2,1,'#00cc00');kk(5,1,2,1,'#00cc00');kk(2,1,1,1,'#003300');kk(5,1,1,1,'#003300');
kk(3,3,2,1,'#ffaaaa');kk(8,3,2,1,'#888');kk(9,1,2,2,'#888');kk(8,0,2,2,'#888');
kk(3,-2,3,2,'#aaa');kk(4,-3,1,2,'#ff8888');
}

function animLoop(){
var c=document.getElementById('anim-canvas');animCtx=c.getContext('2d');
c.width=W;c.height=H;
animCtx.clearRect(0,0,W,H);
animCtx.strokeStyle='rgba(120,200,255,0.14)';animCtx.lineWidth=0.5;
drops.forEach(function(d){animCtx.beginPath();animCtx.moveTo(d.x,d.y);animCtx.lineTo(d.x-1,d.y+d.l);animCtx.stroke();d.y+=d.s;if(d.y>H){d.y=-20;d.x=Math.random()*W;}});

var gY=H*0.72;
vehicles.forEach(function(v){
v.x+=v.speed;
var laneY=gY+4+v.lane*(H*0.035);
if(v.speed>0&&v.x>W+150){v.x=-120-Math.random()*200;v.lane=Math.floor(Math.random()*3);}
if(v.speed<0&&v.x<-150){v.x=W+120+Math.random()*200;v.lane=Math.floor(Math.random()*3);}
v.y=laneY;
if(v.type==='tron'){
animCtx.fillStyle=v.color;
animCtx.fillRect(v.x,v.y,26,5);animCtx.fillRect(v.x+7,v.y-5,12,7);animCtx.fillRect(v.x+11,v.y-9,5,5);
animCtx.fillStyle='#fff';animCtx.fillRect(v.x,v.y+4,4,3);animCtx.fillRect(v.x+22,v.y+4,4,3);
animCtx.fillStyle=v.color+'55';
var tx2=v.speed>0?v.x-v.trail:v.x+26;animCtx.fillRect(tx2,v.y+1,v.trail,2);
animCtx.fillStyle=v.color+'22';animCtx.fillRect(v.speed>0?v.x-v.trail*1.5:v.x+26,v.y+2,v.trail*1.5,1);
}else{
animCtx.fillStyle=v.color+'77';animCtx.fillRect(v.x,v.y,42,12);animCtx.fillRect(v.x+6,v.y-7,26,9);
animCtx.fillStyle='#00112255';animCtx.fillRect(v.x+8,v.y-5,10,6);animCtx.fillRect(v.x+22,v.y-5,10,6);
animCtx.fillStyle='#111';animCtx.fillRect(v.x+4,v.y+10,8,4);animCtx.fillRect(v.x+30,v.y+10,8,4);

function cs(){return state.suits[state.currentSuit];}
function updateHP(){var s=cs();var pct=s.hp/s.maxHp*100;document.getElementById('hp-bar').style.width=pct+'%';var col=pct>50?'#00ff88':pct>25?'#ffaa00':'#ff2d78';document.getElementById('hp-bar').style.background=col;document.getElementById('hp-text').textContent=fmt(s.hp)+' / '+fmt(s.maxHp);}

function render(){var s=cs();drawSuit(state.currentSuit,s.hp/s.maxHp);document.getElementById('suit-name-top').textContent=s.name;document.getElementById('suit-indicator').textContent=(state.currentSuit+1)+' / 7';updateHP();
var lo=document.getElementById('locked-overlay');if(!s.unlocked){lo.classList.add('show');document.getElementById('lock-cost').textContent='\u20B3'+fmt(s.cost);}else lo.classList.remove('show');
document.getElementById('nav-left').disabled=state.currentSuit===0;document.getElementById('nav-right').disabled=state.currentSuit===6;document.getElementById('credits-display').textContent='\u20B3 '+fmt(state.credits);}

function spawnPop(t,c){var a=document.getElementById('suit-area');var d=document.createElement('div');d.className='cpop';d.textContent=t;d.style.color=c;d.style.left=Math.floor(Math.random()*100+40)+'px';d.style.top=Math.floor(Math.random()*40+40)+'px';a.appendChild(d);setTimeout(function(){d.remove();},1000);}

document.getElementById('suit-canvas').addEventListener('click',function(){var s=cs();if(!s.unlocked)return;s.hp=Math.max(0,s.hp-state.damage);state.stats.clicks++;var cv=document.getElementById('suit-canvas');cv.classList.remove('shake');void cv.offsetWidth;cv.classList.add('shake');
if(s.hp<=0){state.credits+=s.reward;state.stats.credits+=s.reward;state.stats.suits_broken++;s.hp=s.maxHp;spawnPop('+\u20B3'+fmt(s.reward),'#ffd700');}else{spawnPop('-'+fmt(state.damage),'#ff2d78');}render();});

document.getElementById('nav-left').addEventListener('click',function(){if(state.currentSuit>0){state.currentSuit--;render();}});
document.getElementById('nav-right').addEventListener('click',function(){if(state.currentSuit<6){state.currentSuit++;render();}});
document.getElementById('lock-btn').addEventListener('click',function(){var s=cs();if(state.credits>=s.cost){state.credits-=s.cost;s.unlocked=true;render();}else{var b=document.getElementById('lock-btn');b.textContent='NOT ENOUGH \u20B3';setTimeout(function(){b.textContent='UNLOCK';},1200);}});

var mStack=[];
function openMenu(){mStack=[];document.getElementById('menu-overlay').classList.add('open');showMain();}
function closeMenu(){document.getElementById('menu-overlay').classList.remove('open');mStack=[];render();}
function showMain(){document.getElementById('menu-title').textContent='// MENU //';document.getElementById('menu-back').classList.remove('visible');var c=document.getElementById('menu-content');c.innerHTML='';
[{i:'\u2699',l:'Settings',f:showSettings},{i:'\u2B06',l:'Upgrades',f:showUpgrades},{i:'\u21BA',l:'Reset',f:doReset},{i:'\u25C8',l:'Stats',f:showStats}].forEach(function(item){var d=document.createElement('div');d.className='mi';d.innerHTML='<span class="mi-icon">'+item.i+'</span><span>'+item.l+'</span>';d.addEventListener('click',function(){if(item.l==='Reset')item.f();else{mStack.push(showMain);item.f();}});c.appendChild(d);});}
function showBack(){var b=document.getElementById('menu-back');b.classList.add('visible');b.onclick=function(){if(mStack.length>0)mStack.pop()();};}
function showSettings(){document.getElementById('menu-title').textContent='// SETTINGS //';showBack();var c=document.getElementById('menu-content');c.innerHTML='<div style="font-size:10px;color:#00ffe544;letter-spacing:2px;margin-bottom:10px;">AUDIO</div><div class="vol-row"><span style="font-size:12px;color:#00ffe5;">Volume</span><div style="display:flex;align-items:center;gap:10px;"><button class="vol-btn" id="vd">\u25C0</button><span id="vdisp" style="font-size:14px;color:#ffd700;min-width:44px;text-align:center;">'+state.volume+' / 10</span><button class="vol-btn" id="vu">\u25B6</button></div></div>';document.getElementById('vd').addEventListener('click',function(){if(state.volume>0){state.volume--;document.getElementById('vdisp').textContent=state.volume+' / 10';}});document.getElementById('vu').addEventListener('click',function(){if(state.volume<10){state.volume++;document.getElementById('vdisp').textContent=state.volume+' / 10';}});}
function showUpgrades(){document.getElementById('menu-title').textContent='// UPGRADES //';showBack();var c=document.getElementById('menu-content');c.innerHTML='';state.upgrades.forEach(function(u){var ok=state.credits>=u.cost;var d=document.createElement('div');d.className='upg-item'+(ok?'':' ulk');d.innerHTML='<div class="upg-info"><div class="upg-name">'+u.name+'</div><div class="upg-desc">'+u.desc+'</div><div class="upg-ob">owned: '+u.owned+'</div></div><button class="upg-buy" '+(ok?'':'disabled')+'>\u20B3'+fmt(u.cost)+'</button>';d.querySelector('.upg-buy').addEventListener('click',function(){if(state.credits>=u.cost){state.credits-=u.cost;u.owned++;u.cost=Math.floor(u.cost*u.mult);state.damage+=u.val;document.getElementById('credits-display').textContent='\u20B3 '+fmt(state.credits);showUpgrades();}});c.appendChild(d);});}
function showStats(){document.getElementById('menu-title').textContent='// STATS //';showBack();var c=document.getElementById('menu-content');var rows=[['Total clicks',fmt(state.stats.clicks)],['Credits earned',fmt(state.stats.credits)],['Current credits',fmt(state.credits)],['Damage/click',fmt(state.damage)],['Suits unlocked',state.suits.filter(function(s){return s.unlocked;}).length+' / 7'],['Suits broken',fmt(state.stats.suits_broken)],['Resets',state.stats.resets]];c.innerHTML='<div style="background:rgba(10,10,30,0.8);border:1px solid #00ffe522;border-radius:6px;overflow:hidden;">'+rows.map(function(r){return'<div class="sr"><span class="sl">'+r[0]+'</span><span class="sv">'+r[1]+'</span></div>';}).join('')+'</div>';}
function doReset(){if(confirm('Reset ALL progress? Cannot be undone.')){state.stats.resets++;state.credits=0;state.damage=1;state.currentSuit=0;state.suits.forEach(function(s,i){s.hp=s.maxHp;if(i>0)s.unlocked=false;});state.upgrades.forEach(function(u){u.owned=0;u.cost=u.base;});closeMenu();render();}}
document.getElementById('menu-btn').addEventListener('click',openMenu);
document.getElementById('menu-close').addEventListener('click',closeMenu);

function init(){drawBG();initRain();initVehicles();animLoop();render();}
window.addEventListener('resize',function(){drawBG();initRain();initVehicles();});
init();
})();
</script>

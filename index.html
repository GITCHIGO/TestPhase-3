<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Grind</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#020208;}
body{font-family:'Share Tech Mono',monospace;color:#00ffe5;}
#app{position:relative;width:100%;height:100vh;max-width:500px;margin:0 auto;overflow:hidden;background:#020208;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#bg{z-index:0;}#fx{z-index:1;pointer-events:none;}#parts{z-index:2;pointer-events:none;}
#scan{position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,rgba(0,255,229,0.015) 0px,rgba(0,255,229,0.015) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:3;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;z-index:4;display:flex;flex-direction:column;pointer-events:none;}
#ui>*{pointer-events:auto;}
#top{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;}
#mbtn{background:none;border:none;color:#00ffe588;font-family:'Share Tech Mono',monospace;font-size:24px;cursor:pointer;padding:12px;min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center;}
#cred{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:#ffd700;text-shadow:0 0 12px #ffd70066;}
#cred.bump{animation:cBump 0.2s ease-out;}
@keyframes cBump{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
#cps-d{font-size:10px;color:#ffd70066;text-align:right;}
#center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;pointer-events:auto;}
#sname{font-family:'Orbitron',monospace;font-size:12px;color:#ff2d78;letter-spacing:4px;margin-bottom:2px;}
#slvl{font-size:10px;color:#ffffff66;letter-spacing:3px;margin-bottom:6px;}
#swrap{position:relative;cursor:pointer;width:200px;height:240px;display:flex;align-items:center;justify-content:center;}
#sc{image-rendering:pixelated;image-rendering:crisp-edges;width:160px;height:200px;}
#hpw{width:200px;margin-top:8px;}
#hpo{background:#ffffff08;border-radius:2px;height:8px;width:100%;overflow:hidden;}
#hpi{height:100%;border-radius:2px;background:#00ff88;transition:width 0.08s;}
#hpt{text-align:center;font-size:9px;color:#ffffff55;margin-top:3px;letter-spacing:1px;}
#combow{position:absolute;top:8%;right:8%;text-align:right;pointer-events:none;}
#cnum{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;color:#ff2d78;opacity:0;text-shadow:0 0 16px #ff2d78;}
#cnum.sh{opacity:1;}
#clbl{font-size:8px;color:#ff2d7888;letter-spacing:3px;opacity:0;}
#clbl.sh{opacity:1;}
#cmult{font-family:'Orbitron',monospace;font-size:12px;color:#ffd700;opacity:0;}
#cmult.sh{opacity:1;}
#mile{position:absolute;top:28%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:#ffd700;text-shadow:0 0 20px #ffd700;pointer-events:none;z-index:10;white-space:nowrap;}
#mile.sh{animation:mPop 1.5s ease-out forwards;}
@keyframes mPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}15%{transform:translate(-50%,-50%) scale(1.2);opacity:1}30%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%) scale(0.8)}}
.cpop{position:absolute;font-family:'Orbitron',monospace;font-weight:900;pointer-events:none;text-shadow:0 0 6px currentColor;z-index:10;}
#nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:4px 0;}
.nb{background:none;border:1px solid #ffffff11;color:#ffffff44;font-size:18px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nb:active:not(:disabled){color:#00ffe5;border-color:#00ffe544;}
.nb:disabled{opacity:0.08;}
#si{font-size:10px;color:#ffffff44;letter-spacing:2px;}
#pw{padding:0 40px;margin:4px 0;}
#po{background:#ffffff06;border-radius:1px;height:3px;width:100%;}
#pi{height:100%;background:#ff2d7844;border-radius:1px;transition:width 0.2s;}
#pt{text-align:center;font-size:8px;color:#ffffff33;margin-top:2px;letter-spacing:2px;}
#bot{padding:6px;text-align:center;font-size:7px;color:#ffffff0d;letter-spacing:3px;}
#lvl-left,#lvl-right{position:absolute;top:50%;transform:translateY(-50%);background:none;border:1px solid #ffd70044;color:#ffd700;font-family:'Orbitron',monospace;font-size:9px;padding:8px 6px;border-radius:4px;cursor:pointer;letter-spacing:1px;z-index:7;display:none;writing-mode:vertical-lr;text-orientation:mixed;}
#lvl-left{left:4px;}
#lvl-right{right:4px;}
#lvl-left.sh,#lvl-right.sh{display:block;}
#lvl-left:active,#lvl-right:active{background:#ffd70011;}
#lk{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(2,2,8,0.95);border:1px solid #ff2d7844;border-radius:8px;padding:28px 40px;text-align:center;display:none;z-index:8;}
#lk.sh{display:block;}
#lc{font-family:'Orbitron',monospace;font-size:16px;color:#ffd700;margin:12px 0;}
#lb{background:none;border:1px solid #ff2d78;color:#ff2d78;font-family:'Share Tech Mono',monospace;font-size:13px;padding:10px 28px;border-radius:4px;cursor:pointer;letter-spacing:2px;}
/* LEVEL UP OVERLAY */
#lvlup{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(2,2,8,0.96);z-index:15;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
#lvlup.sh{display:flex;}
#lvlup h2{font-family:'Orbitron',monospace;font-size:18px;color:#ffd700;letter-spacing:4px;margin-bottom:10px;text-shadow:0 0 20px #ffd70044;}
#lvlup p{font-size:11px;color:#ffffff55;margin-bottom:20px;}
#lvlup button{background:none;border:2px solid #ffd700;color:#ffd700;font-family:'Orbitron',monospace;font-size:14px;padding:12px 32px;border-radius:4px;cursor:pointer;letter-spacing:3px;}
/* MENU */
#mo{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(2,2,8,0.92);z-index:20;display:none;align-items:center;justify-content:center;}
#mo.op{display:flex;}
#mb{background:#060612;border:1px solid #ffffff11;border-radius:10px;width:88%;max-width:340px;max-height:78vh;padding:20px;position:relative;overflow-y:auto;}
#mx{position:absolute;top:8px;right:8px;background:none;border:1px solid #ff2d7844;color:#ff2d78;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
#mkb{position:absolute;top:8px;left:8px;background:none;border:1px solid #ffffff22;color:#ffffff66;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:15px;display:none;align-items:center;justify-content:center;}
#mkb.vi{display:flex;}
#mt{text-align:center;font-family:'Orbitron',monospace;font-size:12px;color:#00ffe5;letter-spacing:4px;margin:6px 0 18px;}
.mi{background:#ffffff05;border:1px solid #ffffff08;border-radius:6px;padding:14px 18px;margin-bottom:6px;cursor:pointer;font-size:13px;color:#00ffe5;letter-spacing:2px;}
.mi:active{background:#ffffff0a;border-color:#ffffff1a;}
.vr{display:flex;align-items:center;justify-content:space-between;background:#ffffff05;border:1px solid #ffffff08;border-radius:6px;padding:14px 18px;margin-bottom:6px;}
.vb{background:none;border:1px solid #ffffff22;color:#ffffff66;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.ui2{display:flex;align-items:center;gap:10px;background:#ffffff05;border:1px solid #ffffff08;border-radius:6px;padding:12px 14px;margin-bottom:6px;}
.ui2.ulk{opacity:0.25;}
.uin{flex:1;}.una{font-size:12px;color:#ffffff88;}.ude{font-size:10px;color:#ffffff44;margin-top:2px;}.uow{font-size:10px;color:#ff2d78;margin-top:2px;}
.ubu{background:none;border:1px solid #ffd70044;color:#ffd700;font-family:'Share Tech Mono',monospace;font-size:11px;padding:6px 10px;border-radius:4px;cursor:pointer;white-space:nowrap;}
.ubu:disabled{opacity:0.2;}
.si2{display:flex;align-items:center;gap:10px;background:#ffffff05;border:1px solid #ffffff08;border-radius:6px;padding:10px 14px;margin-bottom:6px;}
.si2.sac{border-color:#ffd70044;}
.sp2{width:36px;height:36px;border-radius:4px;flex-shrink:0;}
.sin{flex:1;}.sna{font-size:11px;color:#ffffff88;}.sst{font-size:9px;margin-top:2px;}
.sb2{font-family:'Share Tech Mono',monospace;font-size:10px;padding:5px 10px;border-radius:4px;cursor:pointer;background:none;}
.sr2{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #ffffff06;font-size:11px;}.sr2:last-child{border-bottom:none;}.sl2{color:#ffffff44;}.sv2{color:#ffd700;}
@keyframes shk{0%{transform:translate(0,0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,1px)}100%{transform:translate(0,0)}}
.shk{animation:shk 0.12s ease-out;}
</style>
</head>
<body>
<div id="app">
<canvas id="bg"></canvas><canvas id="fx"></canvas><canvas id="parts"></canvas>
<div id="scan"></div>
<div id="ui">
<div id="top"><button id="mbtn">&#9776;</button><div style="text-align:right;"><div id="cred">0</div><div id="cps-d"></div></div></div>
<div id="center">
<div id="sname">SCRAP WALKER</div><div id="slvl">Lv.1 Junk</div>
<div id="swrap"><canvas id="sc" width="160" height="200"></canvas></div>
<div id="hpw"><div id="hpo"><div id="hpi"></div></div><div id="hpt"></div></div>
<div id="combow"><div id="cnum"></div><div id="clbl">COMBO</div><div id="cmult"></div></div>
<div id="mile"></div>
<div id="lk"><div style="font-size:11px;color:#ffffff44;letter-spacing:3px;">LOCKED</div><div id="lc"></div><button id="lb">UNLOCK</button></div>
</div>
<div id="nav"><button class="nb" id="nl">&#9664;</button><div id="si">1/7</div><button class="nb" id="nr">&#9654;</button></div>
<div id="pw"><div id="po"><div id="pi"></div></div><div id="pt"></div></div>
<div id="bot">NEON GRIND</div>
<button id="lvl-left" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);background:none;border:1px solid #ffffff22;color:#ffffff55;font-family:'Share Tech Mono',monospace;font-size:10px;padding:8px 10px;border-radius:4px;cursor:pointer;letter-spacing:1px;display:none;z-index:6;">&#9664; LV1</button>
<button id="lvl-right" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:1px solid #ffd70044;color:#ffd700;font-family:'Share Tech Mono',monospace;font-size:10px;padding:8px 10px;border-radius:4px;cursor:pointer;letter-spacing:1px;display:none;z-index:6;">LV2 &#9654;</button>
</div>
<div id="lvlup"><h2>LEVEL 2 UNLOCKED</h2><p>You've broken all exo suits.<br>Now face the machines.</p><div id="lvl-cost" style="font-family:Orbitron,monospace;font-size:14px;color:#ffd700;margin-bottom:16px;"></div><button id="lvl-btn">ENTER LEVEL 2</button><br><button id="lvl-dismiss" style="background:none;border:1px solid #ffffff22;color:#ffffff44;font-family:Share Tech Mono,monospace;font-size:11px;padding:8px 24px;border-radius:4px;cursor:pointer;margin-top:12px;letter-spacing:2px;">NOT YET</button></div>
<div id="mo"><div id="mb"><button id="mx">&#10005;</button><button id="mkb">&#9664;</button><div id="mt">MENU</div><div id="mc"></div></div></div>
</div>
<script>
(function(){
var W,H,bgC,fxC,ptC;
var skX=0,skY=0,skD=0;
var combo=0,cTimer=null;
var pts=[];var mileQ=[];var mileOn=false;

// AUDIO
var AC=null;
function iA(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function snd(t){if(!AC||S.vol===0)return;var v=S.vol/10*0.2;var n=AC.currentTime;
if(t==='hit'){var o=AC.createOscillator(),g=AC.createGain();o.type='square';o.frequency.setValueAtTime(400+Math.min(combo*20,400),n);o.frequency.exponentialRampToValueAtTime(200,n+0.04);g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.05);o.connect(g);g.connect(AC.destination);o.start();o.stop(n+0.05);}
else if(t==='brk'){[150,250,400].forEach(function(f,i){var o=AC.createOscillator(),g=AC.createGain();o.type='sawtooth';o.frequency.setValueAtTime(f,n+i*0.03);o.frequency.exponentialRampToValueAtTime(f*0.3,n+i*0.03+0.2);g.gain.setValueAtTime(v*1.2,n+i*0.03);g.gain.exponentialRampToValueAtTime(0.001,n+i*0.03+0.2);o.connect(g);g.connect(AC.destination);o.start(n+i*0.03);o.stop(n+i*0.03+0.2);});}
else if(t==='ulk'){[500,600,750,1000].forEach(function(f,i){var o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(f,n+i*0.09);g.gain.setValueAtTime(v*0.6,n+i*0.09);g.gain.exponentialRampToValueAtTime(0.001,n+i*0.09+0.15);o.connect(g);g.connect(AC.destination);o.start(n+i*0.09);o.stop(n+i*0.09+0.15);});}
else if(t==='buy'){var o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(600,n);o.frequency.exponentialRampToValueAtTime(900,n+0.07);g.gain.setValueAtTime(v*0.4,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.09);o.connect(g);g.connect(AC.destination);o.start();o.stop(n+0.09);}}

// PARTICLES
function addP(x,y,n,col,spd,sz){for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2;var s=spd*(0.4+Math.random());pts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:col,sz:sz*(0.5+Math.random()),dc:0.015+Math.random()*0.02});}}
function drawP(){ptC.clearRect(0,0,W,H);for(var i=pts.length-1;i>=0;i--){var p=pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=p.dc;if(p.life<=0){pts.splice(i,1);continue;}ptC.globalAlpha=p.life*p.life;ptC.fillStyle=p.col;ptC.fillRect(p.x-p.sz/2+skX,p.y-p.sz/2+skY,p.sz,p.sz);}ptC.globalAlpha=1;}

// BREAK HALVES ANIMATION
var breakHalves=[];
function spawnBreakHalves(canvasRect,col){
var cx=canvasRect.left+canvasRect.width/2,cy=canvasRect.top+canvasRect.height/2;
var cv=document.getElementById('sc');var imgData=cv.toDataURL();
breakHalves.push({img:imgData,x:cx-80,y:cy-100,vx:-3,vy:-2,rot:0,vr:-0.05,clip:'left',life:1,w:160,h:200});
breakHalves.push({img:imgData,x:cx-80,y:cy-100,vx:3,vy:-2,rot:0,vr:0.05,clip:'right',life:1,w:160,h:200});
}
function drawBreakHalves(){
breakHalves.forEach(function(h){h.x+=h.vx;h.y+=h.vy;h.vy+=0.3;h.rot+=h.vr;h.life-=0.025;});
for(var i=breakHalves.length-1;i>=0;i--){if(breakHalves[i].life<=0)breakHalves.splice(i,1);}
}

function shake(i){skD=i;}
function updShake(){if(skD>0.5){skX=(Math.random()-0.5)*skD;skY=(Math.random()-0.5)*skD;skD*=0.85;}else{skX=0;skY=0;skD=0;}}

// COMBO (balanced: max 2x multiplier)
function cMult(){return 1+Math.min(Math.floor(combo/10)*0.1,1.0);}
function addCombo(){combo++;if(combo>S.st.maxC)S.st.maxC=combo;
if(combo>=5){document.getElementById('cnum').textContent=combo+'x';document.getElementById('cnum').classList.add('sh');document.getElementById('clbl').classList.add('sh');document.getElementById('cmult').textContent=cMult().toFixed(1)+'x';document.getElementById('cmult').classList.add('sh');}
clearTimeout(cTimer);cTimer=setTimeout(function(){combo=0;document.getElementById('cnum').classList.remove('sh');document.getElementById('clbl').classList.remove('sh');document.getElementById('cmult').classList.remove('sh');},900);}

function dmgPop(text,col,x,y,big){
var d=document.createElement('div');var sz=big?22:Math.min(13+combo*0.15,20);
d.className='cpop';d.style.fontSize=sz+'px';d.style.color=col;d.style.left=x+'px';d.style.top=y+'px';d.textContent=text;
document.getElementById('center').appendChild(d);
var vy=-2-Math.random()*2,vx=(Math.random()-0.5)*3,life=1;
function an(){life-=0.03;vy+=0.05;d.style.transform='translate('+Math.floor(vx*15*(1-life))+'px,'+Math.floor(vy*15)+'px) scale('+Math.max(0.5,life)+')';d.style.opacity=life;if(life>0)requestAnimationFrame(an);else d.remove();}
requestAnimationFrame(an);}

function checkMile(){miles.forEach(function(m){if(!S.mh[m.id]&&m.ck()){S.mh[m.id]=true;mileQ.push(m.t);}});showMile();}
function showMile(){if(mileOn||mileQ.length===0)return;mileOn=true;var el=document.getElementById('mile');el.textContent=mileQ.shift();el.classList.remove('sh');void el.offsetWidth;el.classList.add('sh');setTimeout(function(){el.classList.remove('sh');mileOn=false;showMile();},2000);}

function fmt(n){n=Math.floor(n);if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return''+n;}

// STATE
var S={credits:0,cur:0,vol:5,dmg:1,cps:0,lvl:1,
aTheme:'default',aBg:'city',oThemes:['default'],oBgs:['city'],
targets:[ // Level 1: suits
[{n:'SCRAP WALKER',l:'Lv.1 Junk',hp:10,mhp:10,rw:30,cost:0,ul:true,c:'#667788'},
{n:'IRON VIPER',l:'Lv.8 Recon',hp:25,mhp:25,rw:80,cost:30,ul:false,c:'#0088ff'},
{n:'HELLFIRE MK-III',l:'Lv.16 Assault',hp:60,mhp:60,rw:200,cost:120,ul:false,c:'#ff6600'},
{n:'WRAITH PHANTOM',l:'Lv.28 Stealth',hp:150,mhp:150,rw:550,cost:400,ul:false,c:'#aa00ff'},
{n:'BLOOD RONIN',l:'Lv.42 Elite',hp:400,mhp:400,rw:1500,cost:1200,ul:false,c:'#ff2d78'},
{n:'ZERO KELVIN',l:'Lv.66 Legendary',hp:1000,mhp:1000,rw:4000,cost:4000,ul:false,c:'#00ffe5'},
{n:'OMEGA PRIME',l:'Lv.99 God',hp:3000,mhp:3000,rw:12000,cost:12000,ul:false,c:'#ffd700'}],
// Level 2: cars
[{n:'RUST BUCKET',l:'Lv.1 Scrap',hp:5000,mhp:5000,rw:15000,cost:0,ul:true,c:'#8b6914'},
{n:'NEON DRIFT',l:'Lv.12 Street',hp:12000,mhp:12000,rw:40000,cost:25000,ul:false,c:'#ff2d78'},
{n:'PHANTOM CRUISER',l:'Lv.24 Sport',hp:30000,mhp:30000,rw:100000,cost:80000,ul:false,c:'#0088ff'},
{n:'VOLT STRIKER',l:'Lv.38 Racing',hp:80000,mhp:80000,rw:280000,cost:200000,ul:false,c:'#39ff14'},
{n:'CHROME SPECTRE',l:'Lv.55 Hyper',hp:200000,mhp:200000,rw:700000,cost:500000,ul:false,c:'#aa00ff'},
{n:'QUANTUM RACER',l:'Lv.78 Quantum',hp:500000,mhp:500000,rw:2000000,cost:1500000,ul:false,c:'#00ffe5'},
{n:'GOD MACHINE',l:'Lv.99 Omega',hp:1500000,mhp:1500000,rw:6000000,cost:5000000,ul:false,c:'#ffd700'}]
],
ups:[
{id:0,n:'Power Fist',d:'+1 dmg/click',cost:50,own:0,val:1,m:1.6,b:50},
{id:1,n:'Neural Amp',d:'+3 dmg/click',cost:200,own:0,val:3,m:1.6,b:200},
{id:2,n:'Plasma Edge',d:'+10 dmg/click',cost:800,own:0,val:10,m:1.6,b:800},
{id:3,n:'Quantum Fist',d:'+30 dmg/click',cost:3000,own:0,val:30,m:1.6,b:3000},
{id:4,n:'GOD PUNCH',d:'+100 dmg/click',cost:10000,own:0,val:100,m:1.6,b:10000},
{id:5,n:'Auto Drone',d:'+1 cred/sec',cost:100,own:0,val:1,m:1.5,b:100,t:'cps'},
{id:6,n:'Hack Bot',d:'+5 cred/sec',cost:500,own:0,val:5,m:1.5,b:500,t:'cps'},
{id:7,n:'AI Farm',d:'+25 cred/sec',cost:2500,own:0,val:25,m:1.5,b:2500,t:'cps'},
{id:8,n:'Crit Chip',d:'+15% crit chance',cost:1500,own:0,val:15,m:2,b:1500,t:'crit'},
{id:9,n:'Lucky Coin',d:'+10% bonus credits',cost:2000,own:0,val:10,m:2,b:2000,t:'luck'},
{id:10,n:'Rage Module',d:'+5% combo decay time',cost:3000,own:0,val:5,m:1.8,b:3000,t:'rage'},
],
critChance:0,luckBonus:0,comboDecay:900,
st:{clicks:0,creds:0,resets:0,broken:0,maxC:0,crits:0},mh:{},lvl2cost:20000
};

function curTargets(){return S.targets[S.lvl-1];}
function cs(){return curTargets()[S.cur];}

document.getElementById('sname').textContent=s.n;document.getElementById('sname').style.color=s.c;
document.getElementById('slvl').textContent=(S.lvl===1?'SUIT':'CAR')+' // '+s.l;
var pct=s.hp/s.mhp*100;document.getElementById('hpi').style.width=pct+'%';
var col=pct>50?'#00ff88':pct>25?'#ffaa00':'#ff2d78';document.getElementById('hpi').style.background=col;
document.getElementById('hpt').textContent=fmt(s.hp)+' / '+fmt(s.mhp);
var lo=document.getElementById('lk');if(!s.ul){lo.classList.add('sh');document.getElementById('lc').textContent='\u20B3'+fmt(s.cost);}else lo.classList.remove('sh');
document.getElementById('nl').disabled=S.cur===0;document.getElementById('nr').disabled=S.cur>=tg.length-1;
document.getElementById('cred').textContent=fmt(S.credits);
document.getElementById('cps-d').textContent=S.cps>0?fmt(S.cps)+'/sec':'';
document.getElementById('si').textContent=(S.cur+1)+'/'+tg.length;
var th=themes.find(function(t){return t.id===S.aTheme;})||themes[0];
document.getElementById('cred').style.color=th.a;document.getElementById('cred').style.textShadow='0 0 12px '+th.a+'66';
document.getElementById('cps-d').style.color=th.a+'66';
document.getElementById('hpt').style.color=th.a+'88';
document.getElementById('mbtn').style.color=th.a+'88';
var nxt=tg.find(function(s){return!s.ul;});
if(nxt){var pp=Math.min(100,S.credits/nxt.cost*100);document.getElementById('pi').style.width=pp+'%';document.getElementById('pt').textContent='NEXT: \u20B3'+fmt(nxt.cost);}
else{document.getElementById('pi').style.width='100%';document.getElementById('pt').textContent=S.lvl===1?'ALL SUITS UNLOCKED':'ALL CARS UNLOCKED';}
// Level switch buttons
var allL1=S.targets[0].every(function(t){return t.ul;});
document.getElementById('lvl-right').style.display=(S.lvl===1&&allL1)?'block':'none';
document.getElementById('lvl-left').style.display=(S.lvl===2)?'block':'none';
// Level nav buttons
var lvlR=document.getElementById('lvl-right');var lvlL=document.getElementById('lvl-left');
if(S.lvl>=2){lvlL.classList.add('sh');lvlL.textContent='\u25C0 LV'+(S.lvl-1);}else lvlL.classList.remove('sh');
if(S.targets.length>S.lvl){var prevAll=S.targets[S.lvl-1].every(function(t){return t.ul;});if(prevAll){lvlR.classList.add('sh');lvlR.textContent='LV'+(S.lvl+1)+' \u25B6';}else lvlR.classList.remove('sh');}else lvlR.classList.remove('sh');
}

// CLICK
document.getElementById('swrap').addEventListener('click',function(e){iA();var s=cs();if(!s.ul)return;
addCombo();var isCrit=Math.random()*100<S.critChance;
var totalD=Math.floor(S.dmg*cMult()*(isCrit?3:1));
s.hp=Math.max(0,s.hp-totalD);S.st.clicks++;if(isCrit)S.st.crits++;
var cv=document.getElementById('sc');cv.classList.remove('shk');void cv.offsetWidth;cv.classList.add('shk');
shake(3+Math.min(combo*0.2,6));snd('hit');
var rect=cv.getBoundingClientRect();var cx=e.clientX||rect.left+rect.width/2;var cy=e.clientY||rect.top+rect.height/2;
addP(cx,cy,4,s.c,3,3);addP(cx,cy,2,'#fff',2,2);
var cRect=document.getElementById('center').getBoundingClientRect();var rx=cx-cRect.left,ry=cy-cRect.top;
dmgPop(isCrit?'CRIT! -'+fmt(totalD):'-'+fmt(totalD),isCrit?'#ffd700':s.c,rx-20+Math.random()*40,ry-20+Math.random()*20,false);
if(s.hp<=0){
var reward=Math.floor(s.rw*cMult()*(1+S.luckBonus/100));
S.credits+=reward;S.st.creds+=reward;S.st.broken++;
snd('brk');shake(12);addP(cx,cy,35,s.c,7,5);addP(cx,cy,15,'#fff',5,3);addP(cx,cy,10,'#ffd700',4,4);
spawnBreakHalves(rect,s.c);
s.hp=s.mhp;
dmgPop('+\u20B3'+fmt(reward),'#ffd700',rx-30,ry-60,true);
fxC.fillStyle=s.c+'22';fxC.fillRect(0,0,W,H);setTimeout(function(){fxC.clearRect(0,0,W,H);},60);
// Check level up
var tg=curTargets();var allUl=tg.every(function(t){return t.ul;});
if(allUl&&S.cur===tg.length-1&&S.lvl===1){
setTimeout(function(){document.getElementById('lvl-cost').textContent='Cost: \u20B3'+fmt(S.lvl2cost);document.getElementById('lvlup').classList.add('sh');},500);
}}
var credEl=document.getElementById('cred');credEl.classList.remove('bump');void credEl.offsetWidth;credEl.classList.add('bump');
render();checkMile();});

document.getElementById('nl').addEventListener('click',function(){if(S.cur>0){S.cur--;render();}});
document.getElementById('nr').addEventListener('click',function(){if(S.cur<curTargets().length-1){S.cur++;render();}});
document.getElementById('lb').addEventListener('click',function(){iA();var s=cs();if(S.credits>=s.cost){S.credits-=s.cost;s.ul=true;snd('ulk');shake(5);render();checkMile();}else{var b=document.getElementById('lb');b.textContent='NEED MORE';setTimeout(function(){b.textContent='UNLOCK';},1000);}});

// LEVEL UP
document.getElementById('lvl-btn').addEventListener('click',function(){iA();
if(S.credits>=S.lvl2cost){S.credits-=S.lvl2cost;S.targets[1][0].ul=true;S.lvl=2;S.cur=0;document.getElementById('lvlup').classList.remove('sh');snd('ulk');render();checkMile();}
else{document.getElementById('lvl-btn').textContent='NEED \u20B3'+fmt(S.lvl2cost);setTimeout(function(){document.getElementById('lvl-btn').textContent='ENTER LEVEL 2';},1500);}});
document.getElementById('lvl-dismiss').addEventListener('click',function(){document.getElementById('lvlup').classList.remove('sh');});

// Level navigation buttons
document.getElementById('lvl-right').addEventListener('click',function(){iA();
if(S.targets.length>S.lvl){
var allUl=S.targets[S.lvl-1].every(function(t){return t.ul;});
if(allUl){
if(S.lvl===1&&!S.targets[1][0].ul){
// Need to pay to unlock level 2
document.getElementById('lvl-cost').textContent='Cost: \u20B3'+fmt(S.lvl2cost);document.getElementById('lvlup').classList.add('sh');
}else{S.lvl++;S.cur=0;render();}
}}});
document.getElementById('lvl-left').addEventListener('click',function(){if(S.lvl>1){S.lvl--;S.cur=0;render();}});

// MENU
var mS=[];
function oM(){mS=[];document.getElementById('mo').classList.add('op');sMain();}
function cM(){document.getElementById('mo').classList.remove('op');mS=[];render();}
function sMain(){var th=themes.find(function(t){return t.id===S.aTheme;})||themes[0];
document.getElementById('mt').textContent='MENU';document.getElementById('mt').style.color=th.a;document.getElementById('mkb').classList.remove('vi');
var c=document.getElementById('mc');c.innerHTML='';
['Settings','Upgrades','Shop','Reset','Stats'].forEach(function(l){var d=document.createElement('div');d.className='mi';d.textContent=l;d.style.color=th.a;
d.addEventListener('click',function(){mS.push(sMain);if(l==='Settings')sSet();else if(l==='Upgrades')sUpg();else if(l==='Shop')sShp();else if(l==='Reset')sRes();else sSta();});c.appendChild(d);});
var g=document.createElement('div');g.style.cssText='text-align:center;margin-top:14px;font-size:9px;color:#ffffff33;letter-spacing:3px;';g.textContent='MADE BY GITCHI';c.appendChild(g);}

function sBk(){var b=document.getElementById('mkb');b.classList.add('vi');b.onclick=function(){if(mS.length>0)mS.pop()();};}

function sSet(){document.getElementById('mt').textContent='SETTINGS';sBk();var c=document.getElementById('mc');c.innerHTML='<div class="vr"><span style="color:#ffffff66;">Volume</span><div style="display:flex;align-items:center;gap:10px;"><button class="vb" id="vd">\u25C0</button><span id="vv" style="font-size:13px;color:#ffd700;min-width:40px;text-align:center;">'+S.vol+'/10</span><button class="vb" id="vu">\u25B6</button></div></div>';
document.getElementById('vd').addEventListener('click',function(){if(S.vol>0){S.vol--;document.getElementById('vv').textContent=S.vol+'/10';}});
document.getElementById('vu').addEventListener('click',function(){if(S.vol<10){S.vol++;document.getElementById('vv').textContent=S.vol+'/10';}});}

function sUpg(){document.getElementById('mt').textContent='UPGRADES';sBk();var c=document.getElementById('mc');c.innerHTML='';
S.ups.forEach(function(u){var ok=S.credits>=u.cost;var d=document.createElement('div');d.className='ui2'+(ok?'':' ulk');
d.innerHTML='<div class="uin"><div class="una">'+u.n+'</div><div class="ude">'+u.d+'</div><div class="uow">x'+u.own+'</div></div><button class="ubu" '+(ok?'':'disabled')+'>\u20B3'+fmt(u.cost)+'</button>';
d.querySelector('.ubu').addEventListener('click',function(){iA();if(S.credits>=u.cost){S.credits-=u.cost;u.own++;u.cost=Math.floor(u.cost*u.m);
if(u.t==='cps')S.cps+=u.val;else if(u.t==='crit')S.critChance=Math.min(S.critChance+u.val,75);
else if(u.t==='luck')S.luckBonus+=u.val;else if(u.t==='rage'){S.comboDecay+=50;}
else S.dmg+=u.val;
snd('buy');document.getElementById('cred').textContent=fmt(S.credits);sUpg();}});c.appendChild(d);});}

function sShp(){document.getElementById('mt').textContent='SHOP';sBk();var c=document.getElementById('mc');c.innerHTML='';
var h1=document.createElement('div');h1.style.cssText='font-size:9px;color:#ffffff33;letter-spacing:3px;margin-bottom:8px;';h1.textContent='UI THEMES';c.appendChild(h1);
themes.forEach(function(t){var own=S.oThemes.indexOf(t.id)>-1,act=S.aTheme===t.id;
var d=document.createElement('div');d.className='si2'+(act?' sac':'');
d.innerHTML='<div class="sp2" style="background:'+t.a+'22;border:1px solid '+t.a+'44;"></div><div class="sin"><div class="sna" style="color:'+t.a+';">'+t.n+'</div><div class="sst" style="color:'+(act?'#ffd700':own?'#00ff8866':'#ffffff22')+';">'+(act?'EQUIPPED':own?'OWNED':'')+'</div></div>';
if(!own){var b=document.createElement('button');b.className='sb2';b.style.cssText='border:1px solid #ffd70044;color:#ffd700;';b.textContent='\u20B3'+fmt(t.cost);if(S.credits<t.cost)b.disabled=true;b.addEventListener('click',function(){iA();if(S.credits>=t.cost){S.credits-=t.cost;S.oThemes.push(t.id);S.aTheme=t.id;snd('ulk');sShp();render();}});d.appendChild(b);}
else if(!act){var b=document.createElement('button');b.className='sb2';b.style.cssText='border:1px solid #ffffff22;color:#ffffff55;';b.textContent='EQUIP';b.addEventListener('click',function(){S.aTheme=t.id;snd('buy');sShp();render();});d.appendChild(b);}
c.appendChild(d);});
var h2=document.createElement('div');h2.style.cssText='font-size:9px;color:#ffffff33;letter-spacing:3px;margin:14px 0 8px;';h2.textContent='BACKGROUNDS';c.appendChild(h2);
bgs.forEach(function(bg){var own=S.oBgs.indexOf(bg.id)>-1,act=S.aBg===bg.id;
var d=document.createElement('div');d.className='si2'+(act?' sac':'');
var pc={city:'#0a0a28',void:'#020208',nebula:'#04020a',saturn:'#030310',warp:'#010108'};
d.innerHTML='<div class="sp2" style="background:'+(pc[bg.id]||'#111')+';border:1px solid #ffffff11;"></div><div class="sin"><div class="sna">'+bg.n+'</div><div class="sst" style="color:'+(act?'#ffd700':own?'#00ff8866':'#ffffff22')+';">'+(act?'EQUIPPED':own?'OWNED':'')+'</div></div>';
if(!own){var b=document.createElement('button');b.className='sb2';b.style.cssText='border:1px solid #ffd70044;color:#ffd700;';b.textContent='\u20B3'+fmt(bg.cost);if(S.credits<bg.cost)b.disabled=true;b.addEventListener('click',function(){iA();if(S.credits>=bg.cost){S.credits-=bg.cost;S.oBgs.push(bg.id);S.aBg=bg.id;snd('ulk');drawBG();initAmb();sShp();render();}});d.appendChild(b);}
else if(!act){var b=document.createElement('button');b.className='sb2';b.style.cssText='border:1px solid #ffffff22;color:#ffffff55;';b.textContent='EQUIP';b.addEventListener('click',function(){S.aBg=bg.id;snd('buy');drawBG();initAmb();sShp();render();});d.appendChild(b);}
c.appendChild(d);});}

function sSta(){document.getElementById('mt').textContent='STATS';sBk();var c=document.getElementById('mc');
var rows=[['Level',S.lvl],['Clicks',fmt(S.st.clicks)],['Crits',fmt(S.st.crits)],['Credits earned',fmt(S.st.creds)],['Credits',fmt(S.credits)],['Damage/click',fmt(S.dmg)],['Crit chance',S.critChance+'%'],['Luck bonus',S.luckBonus+'%'],['Credits/sec',fmt(S.cps)],['Broken',fmt(S.st.broken)],['Max combo',S.st.maxC+'x'],['Resets',S.st.resets]];
c.innerHTML='<div style="background:#ffffff03;border:1px solid #ffffff08;border-radius:6px;overflow:hidden;">'+rows.map(function(r){return'<div class="sr2"><span class="sl2">'+r[0]+'</span><span class="sv2">'+r[1]+'</span></div>';}).join('')+'</div>';}

function sRes(){document.getElementById('mt').textContent='RESET';sBk();var c=document.getElementById('mc');
c.innerHTML='<div style="text-align:center;padding:20px 0;"><div style="font-size:13px;color:#ff2d78;margin-bottom:10px;">Reset everything?</div><div style="font-size:10px;color:#ffffff33;margin-bottom:20px;">All progress will be lost.</div><div style="display:flex;gap:12px;justify-content:center;"><button id="ry" class="mi" style="color:#ff2d78;padding:10px 20px;">YES</button><button id="rn" class="mi" style="color:#ffffff44;padding:10px 20px;">CANCEL</button></div></div>';
document.getElementById('ry').addEventListener('click',function(){S.st.resets++;S.credits=0;S.dmg=1;S.cps=0;S.cur=0;S.lvl=1;S.critChance=0;S.luckBonus=0;S.comboDecay=900;S.aTheme='default';S.aBg='city';S.oThemes=['default'];S.oBgs=['city'];S.mh={};combo=0;
S.targets.forEach(function(lv){lv.forEach(function(t,i){t.hp=t.mhp;if(i>0)t.ul=false;else t.ul=true;});});
S.ups.forEach(function(u){u.own=0;u.cost=u.b;});drawBG();initAmb();cM();render();});
document.getElementById('rn').addEventListener('click',function(){if(mS.length>0)mS.pop()();});}

document.getElementById('mbtn').addEventListener('click',function(){iA();oM();});
document.getElementById('mx').addEventListener('click',cM);

// LEVEL SWITCH BUTTONS
document.getElementById('lvl-right').addEventListener('click',function(){iA();
if(S.lvl>=2){S.lvl=2;S.cur=0;render();}
else if(S.targets[0].every(function(t){return t.ul;})&&S.credits>=S.lvl2cost){
document.getElementById('lvl-cost').textContent='Cost: \u20B3'+fmt(S.lvl2cost);document.getElementById('lvlup').classList.add('sh');}
else if(S.targets[0].every(function(t){return t.ul;})){
document.getElementById('lvl-cost').textContent='Cost: \u20B3'+fmt(S.lvl2cost);document.getElementById('lvlup').classList.add('sh');}
});
document.getElementById('lvl-left').addEventListener('click',function(){S.lvl=1;S.cur=0;render();});

// INIT
initBG();initDrops();initVehs();initAmb();render();loop();
window.addEventListener('resize',function(){initBG();initDrops();initVehs();initAmb();});
})();
</script>
</body>
</html>
